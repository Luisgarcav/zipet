name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            release_name: x86_64-linux
            zig_target: ""
          - os: macos-latest
            release_name: aarch64-macos
            zig_target: ""
          - os: macos-latest
            release_name: x86_64-macos
            zig_target: x86_64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Debug runner info
        run: |
          uname -a
          zig version
          zig env

      - name: Build (native runner target, optional macOS cross build)
        run: |
          if [ -n "${{ matrix.zig_target }}" ]; then
            zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.zig_target }}
          else
            zig build -Doptimize=ReleaseSafe
          fi

      - name: Package
        run: |
          tar -czf zipet-${{ matrix.release_name }}.tar.gz -C zig-out/bin zipet

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zipet-${{ matrix.release_name }}
          path: zipet-${{ matrix.release_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zipet-x86_64-linux/zipet-x86_64-linux.tar.gz
            zipet-x86_64-macos/zipet-x86_64-macos.tar.gz
            zipet-aarch64-macos/zipet-aarch64-macos.tar.gz
          generate_release_notes: true
